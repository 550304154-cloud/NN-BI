<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NN Data BI - 商业高管决策大盘</title>
    <!-- 引入 Inter 字体以提升顶级商业 SaaS 高级感 -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <style>
        /* ================= 顶级商业 SaaS 视觉规范 (对标 Vercel / Stripe / Tableau) ================= */
        :root {
            /* 背景色 - 极简冷灰与纯白面板 */
            --bg-body: #F8FAFC;         /* Slate 50 - 极浅冷灰底色 */
            --bg-surface: #FFFFFF;      /* 纯白面板 */
            --bg-hover: #F1F5F9;        /* Slate 100 */
            
            /* 文字颜色 - 摒弃纯黑，使用高级深灰 */
            --text-strong: #0F172A;     /* Slate 900 - 极深灰（主标题/数值） */
            --text-base: #334155;       /* Slate 700 - 正文 */
            --text-muted: #64748B;      /* Slate 500 - 辅助/注释 */
            
            /* 边框与分割线 - 极其细腻的灰度 */
            --border-subtle: #F1F5F9;   /* Slate 100 */
            --border-base: #E2E8F0;     /* Slate 200 */
            --border-strong: #CBD5E1;   /* Slate 300 */
            
            /* 品牌色 - 沉稳内敛的深色系与商业蓝 */
            --brand-primary: #0F172A;   /* 极简高级：主色用深灰黑 */
            --brand-accent: #2563EB;    /* 强调色：商业蓝 */
            --brand-light: #F1F5F9;     /* 激活态底色 */
            
            /* 状态色 - 低饱和度、不刺眼 */
            --success-bg: #DCFCE7;      /* Green 50 */
            --success-text: #166534;    /* Green 800 */
            --danger-bg: #FEE2E2;       /* Red 50 */
            --danger-text: #991B1B;     /* Red 800 */
            
            /* 阴影 - 极其克制、干净的 SaaS 级弥散阴影 */
            --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
            --shadow-float: 0 10px 15px -3px rgba(0, 0, 0, 0.08), 0 4px 6px -2px rgba(0, 0, 0, 0.04);
            
            /* 圆角 - 商业感偏向硬朗克制的圆角，摒弃大圆角 */
            --radius-sm: 6px;
            --radius-md: 10px;
            --radius-lg: 12px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; 
            background: var(--bg-body); 
            color: var(--text-base); 
            height: 100vh; 
            display: flex; 
            overflow: hidden; 
            -webkit-font-smoothing: antialiased; 
            -moz-osx-font-smoothing: grayscale;
        }

        /* --- 1. 侧边栏 (极简、无渐变、纯净) --- */
        .sidebar { 
            width: 240px; 
            background: var(--bg-surface); 
            display: flex; 
            flex-direction: column; 
            flex-shrink: 0; 
            z-index: 100; 
            border-right: 1px solid var(--border-base); 
        }
        .logo-box { 
            height: 64px; 
            display: flex; 
            align-items: center; 
            padding: 0 20px; 
            gap: 10px; 
            border-bottom: 1px solid var(--border-subtle);
        }
        .logo-icon { 
            width: 28px; height: 28px; 
            background: var(--text-strong); 
            border-radius: 6px; 
            display: flex; align-items: center; justify-content: center; 
            color: #fff; font-weight: 800; font-size: 14px; 
        }
        .logo-text { font-size: 16px; font-weight: 700; color: var(--text-strong); letter-spacing: -0.3px;}
        
        /* 菜单项 */
        .menu-list { flex: 1; overflow-y: auto; padding: 16px 12px; display: flex; flex-direction: column; gap: 4px;}
        .menu-item { 
            padding: 10px 12px; 
            border-radius: var(--radius-sm); 
            cursor: pointer; 
            display: flex; 
            align-items: center; 
            gap: 12px; 
            background: transparent;
            border: none;
            transition: all 0.15s ease;
            position: relative;
        }
        .menu-item:hover { background: var(--bg-hover); }
        .menu-item.active { 
            background: var(--brand-light);
        }
        .menu-icon {
            font-size: 16px;
            display: flex; align-items: center; justify-content: center;
            opacity: 0.6;
            filter: grayscale(100%);
            transition: all 0.2s;
        }
        .menu-item.active .menu-icon { opacity: 1; filter: grayscale(0%); }
        .menu-text { display: flex; flex-direction: column; }
        .menu-title { font-size: 14px; font-weight: 500; color: var(--text-base); transition: 0.2s;}
        .menu-item.active .menu-title { color: var(--text-strong); font-weight: 600; }
        
        /* --- 主体右侧区域 --- */
        .main-layout { flex: 1; display: flex; flex-direction: column; overflow: hidden;}
        
        /* 顶部 Header */
        .top-header { 
            height: 64px; 
            background: var(--bg-surface); 
            display: flex; 
            align-items: center; 
            justify-content: space-between; 
            padding: 0 32px; 
            border-bottom: 1px solid var(--border-base); 
            flex-shrink: 0; 
            z-index: 50;
        }
        .header-title-box { display: flex; align-items: baseline; gap: 12px; }
        .header-title { font-size: 18px; font-weight: 600; color: var(--text-strong); letter-spacing: -0.5px;}
        .header-subtitle { font-size: 13px; color: var(--text-muted); font-weight: 400; }
        
        .btn-export { 
            background: var(--bg-surface); 
            border: 1px solid var(--border-strong); 
            color: var(--text-strong); 
            padding: 0 14px; 
            height: 32px; 
            border-radius: var(--radius-sm); 
            font-size: 13px; 
            font-weight: 500; 
            cursor: pointer; 
            display: flex; 
            align-items: center; 
            gap: 6px; 
            transition: all 0.15s; 
            box-shadow: var(--shadow-sm);
        }
        .btn-export:hover { background: var(--bg-hover); border-color: var(--text-strong); }

        /* 控制台 */
        .toolbar { 
            display: flex; 
            align-items: center; 
            justify-content: space-between; 
            padding: 16px 32px; 
            background: var(--bg-body); 
            flex-shrink: 0; 
            z-index: 40;
        }
        .toolbar-left, .toolbar-right { display: flex; align-items: center; gap: 16px; }

        .segment-control { display: flex; background: var(--border-base); border-radius: var(--radius-sm); padding: 3px; }
        .segment-control button { border: none; background: transparent; padding: 6px 16px; font-size: 13px; font-weight: 500; color: var(--text-muted); cursor: pointer; border-radius: 4px; transition: 0.15s; outline: none;}
        .segment-control button:hover { color: var(--text-strong); }
        .segment-control button.active { background: var(--bg-surface); color: var(--text-strong); box-shadow: var(--shadow-sm); font-weight: 600;}

        .quick-filters { display: flex; gap: 4px; border-right: 1px solid var(--border-strong); padding-right: 16px;}
        .quick-filters button { border: 1px solid transparent; background: transparent; padding: 6px 12px; font-size: 13px; font-weight: 500; color: var(--text-base); cursor: pointer; border-radius: var(--radius-sm); transition: 0.15s;}
        .quick-filters button:hover { background: var(--border-base); color: var(--text-strong); }
        .quick-filters button.active { background: var(--text-strong); color: var(--bg-surface); font-weight: 500;}

        .date-inputs { display: flex; align-items: center; gap: 8px; }
        .date-inputs input { background: var(--bg-surface); border: 1px solid var(--border-strong); padding: 0 10px; height: 32px; border-radius: var(--radius-sm); outline: none; font-size: 13px; font-weight: 500; color: var(--text-strong); cursor: pointer; font-family: inherit;}
        .date-inputs input:focus { border-color: var(--text-strong); box-shadow: 0 0 0 2px var(--border-base); }
        .date-inputs span { color: var(--text-muted); font-size: 13px;}

        /* --- 画布区 --- */
        .content-scroll { flex: 1; overflow-y: auto; overflow-x: hidden; padding: 0 32px 60px 32px; position: relative; scroll-behavior: smooth;}
        .content-scroll::-webkit-scrollbar { width: 6px; }
        .content-scroll::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 3px; }
        
        .dashboard-wrapper { display: none; animation: fadeIn 0.3s ease; }
        .dashboard-wrapper.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }

        .section-title { font-size: 15px; font-weight: 600; color: var(--text-strong); margin: 16px 0 16px 0; display: flex; align-items: center; gap: 8px;}

        /* ================= KPI 卡片 (高级平铺风) ================= */
        .kpi-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 32px; }
        
        .kpi-card { 
            background: var(--bg-surface); 
            border: 1px solid var(--border-base); 
            border-radius: var(--radius-md); 
            padding: 20px;
            display: flex; 
            flex-direction: column; 
            position: relative; 
            box-shadow: var(--shadow-sm);
            transition: box-shadow 0.2s ease, border-color 0.2s ease;
            min-height: 140px;
        }
        .kpi-card:hover { box-shadow: var(--shadow-md); border-color: var(--border-strong); z-index: 10;}
        
        .kpi-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px;}
        .kpi-name-box { display: flex; align-items: center; gap: 6px; position: relative;}
        .kpi-name { font-size: 13px; font-weight: 500; color: var(--text-muted);}
        
        .info-wrapper { position: relative; display: inline-flex; align-items: center; justify-content: center;}
        .info-icon { display: flex; align-items: center; justify-content: center; width: 14px; height: 14px; border-radius: 50%; background: var(--border-subtle); color: var(--text-muted); font-size: 10px; font-weight: 600; cursor: help;}
        .info-icon:hover { background: var(--border-base); color: var(--text-strong); }
        
        .tooltip-box { visibility: hidden; opacity: 0; background: var(--text-strong); color: var(--bg-surface); border-radius: var(--radius-sm); padding: 8px 12px; position: absolute; top: calc(100% + 6px); left: 0; width: max-content; max-width: 240px; font-size: 12px; line-height: 1.5; font-weight: 400; transition: 0.15s; z-index: 999999; box-shadow: var(--shadow-float); pointer-events: none;}
        .tooltip-box b { color: #fff; font-size: 13px; display: block; margin-bottom: 2px; font-weight: 600; }
        .info-wrapper:hover .tooltip-box { visibility: visible; opacity: 1;}
        
        .kpi-main { display: flex; align-items: baseline; gap: 10px; margin-bottom: 12px;}
        /* 数值采用无衬线高对比度字体 */
        .kpi-val { font-size: 28px; font-weight: 700; color: var(--text-strong); letter-spacing: -0.5px; line-height: 1;}
        
        .kpi-trend { font-size: 12px; font-weight: 600; padding: 2px 6px; border-radius: 4px; display: flex; align-items: center; gap: 2px;}
        .kpi-trend.up { background: var(--success-bg); color: var(--success-text); }
        .kpi-trend.down { background: var(--danger-bg); color: var(--danger-text); }
        .kpi-trend.neu { background: var(--border-subtle); color: var(--text-muted); }
        
        /* 极其收敛的趋势图，融入卡片底部 */
        .sparkline-container { height: 35px; width: 100%; margin-top: auto; opacity: 0.8;}
        .kpi-card:hover .sparkline-container { opacity: 1;}
        .kpi-sparkline { height: 100%; width: 100%;}

        /* ================= 图表矩阵 ================= */
        .chart-grid { display: grid; grid-template-columns: repeat(24, 1fr); gap: 16px; margin-bottom: 32px;}
        .col-8 { grid-column: span 8; }   
        .col-12 { grid-column: span 12; } 
        .col-16 { grid-column: span 16; } 
        .col-24 { grid-column: span 24; } 

        .chart-card { 
            background: var(--bg-surface); 
            border-radius: var(--radius-md); 
            padding: 24px; 
            box-shadow: var(--shadow-sm); 
            display: flex; 
            flex-direction: column; 
            min-height: 380px; 
            border: 1px solid var(--border-base); 
            position: relative; 
        }
        
        .chart-header { margin-bottom: 20px; display: flex; flex-direction: column; gap: 4px;}
        .chart-title { font-size: 15px; font-weight: 600; color: var(--text-strong); display: flex; align-items: center;}
        .chart-desc { font-size: 12px; color: var(--text-muted); line-height: 1.4;}
        .chart-container { width: 100%; flex: 1; min-height: 280px; position: relative; z-index: 2;}
        
        .echarts-tooltip { z-index: 99999 !important; background-color: var(--bg-surface) !important; border: 1px solid var(--border-base) !important; color: var(--text-base) !important; box-shadow: var(--shadow-float) !important; border-radius: var(--radius-sm) !important; font-family: inherit !important; }

        /* ================= Executive BI visual layer ================= */
        :root {
            --bg-body: #EEF3F8;
            --bg-surface: rgba(255, 255, 255, 0.92);
            --bg-hover: rgba(37, 99, 235, 0.08);
            --text-strong: #07111F;
            --text-base: #243247;
            --text-muted: #718096;
            --border-subtle: rgba(148, 163, 184, 0.14);
            --border-base: rgba(148, 163, 184, 0.28);
            --border-strong: rgba(99, 116, 139, 0.36);
            --brand-primary: #07111F;
            --brand-accent: #1769FF;
            --brand-cyan: #06B6D4;
            --brand-emerald: #10B981;
            --brand-light: rgba(23, 105, 255, 0.12);
            --success-bg: rgba(16, 185, 129, 0.12);
            --success-text: #047857;
            --danger-bg: rgba(239, 68, 68, 0.11);
            --danger-text: #B91C1C;
            --shadow-sm: 0 8px 24px rgba(15, 23, 42, 0.06);
            --shadow-md: 0 18px 44px rgba(15, 23, 42, 0.10);
            --shadow-float: 0 24px 70px rgba(7, 17, 31, 0.18);
            --radius-sm: 8px;
            --radius-md: 12px;
            --radius-lg: 16px;
        }

        body {
            background:
                radial-gradient(circle at 18% -10%, rgba(23, 105, 255, 0.18), transparent 34%),
                linear-gradient(135deg, #F7FAFC 0%, #E8EEF6 50%, #F6F8FB 100%);
        }

        .sidebar {
            width: 256px;
            background: linear-gradient(180deg, #07111F 0%, #0B1728 54%, #101B2D 100%);
            border-right: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 18px 0 50px rgba(7, 17, 31, 0.16);
        }

        .logo-box {
            height: 72px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            padding: 0 22px;
        }

        .logo-icon {
            width: 34px;
            height: 34px;
            background: linear-gradient(135deg, #FFFFFF 0%, #BFD7FF 100%);
            color: #07111F;
            box-shadow: 0 12px 28px rgba(23, 105, 255, 0.24);
        }

        .logo-text {
            color: #FFFFFF;
            font-size: 17px;
            letter-spacing: 0;
        }

        .menu-list { padding: 18px 14px; gap: 6px; }

        .menu-item {
            min-height: 48px;
            color: rgba(255, 255, 255, 0.72);
            border: 1px solid transparent;
        }

        .menu-item:hover {
            background: rgba(255, 255, 255, 0.07);
            border-color: rgba(255, 255, 255, 0.08);
        }

        .menu-item.active {
            background: linear-gradient(135deg, rgba(23, 105, 255, 0.24), rgba(6, 182, 212, 0.11));
            border-color: rgba(125, 179, 255, 0.28);
            box-shadow: inset 3px 0 0 #49B6FF, 0 14px 30px rgba(0, 0, 0, 0.16);
        }

        .menu-icon {
            width: 28px;
            height: 28px;
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.08);
            opacity: 1;
            filter: none;
            font-size: 15px;
        }

        .menu-item.active .menu-icon {
            background: rgba(255, 255, 255, 0.16);
            box-shadow: 0 8px 20px rgba(23, 105, 255, 0.20);
        }

        .menu-title { color: rgba(255, 255, 255, 0.74); font-size: 14px; }
        .menu-item.active .menu-title { color: #FFFFFF; }
        .menu-sub { color: rgba(226, 232, 240, 0.48); font-size: 11px; margin-top: 2px; }

        .main-layout {
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.58), rgba(255, 255, 255, 0.22));
        }

        .top-header {
            height: 72px;
            background: rgba(255, 255, 255, 0.76);
            backdrop-filter: blur(18px);
            border-bottom: 1px solid rgba(148, 163, 184, 0.24);
        }

        .header-title { font-size: 20px; font-weight: 750; }
        .header-subtitle {
            color: #1769FF;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0.08em;
        }

        .btn-export {
            height: 36px;
            background: #07111F;
            color: #FFFFFF;
            border-color: #07111F;
            box-shadow: 0 14px 30px rgba(7, 17, 31, 0.20);
        }

        .btn-export:hover {
            background: #1769FF;
            border-color: #1769FF;
            transform: translateY(-1px);
        }

        .toolbar {
            padding: 18px 32px 14px;
            background: transparent;
        }

        .segment-control,
        .quick-filters,
        .date-inputs input {
            background: rgba(255, 255, 255, 0.78);
            border: 1px solid rgba(148, 163, 184, 0.26);
            box-shadow: 0 12px 32px rgba(15, 23, 42, 0.05);
            backdrop-filter: blur(14px);
        }

        .quick-filters { border-right: 0; padding: 3px; border-radius: var(--radius-sm); gap: 2px; }
        .quick-filters button.active,
        .segment-control button.active {
            background: linear-gradient(135deg, #07111F, #173A72);
            color: #FFFFFF;
            box-shadow: 0 10px 22px rgba(7, 17, 31, 0.18);
        }

        .content-scroll { padding: 0 32px 64px; }

        .dashboard-hero {
            margin: 4px 0 22px;
            min-height: 128px;
            border-radius: var(--radius-lg);
            padding: 24px 28px;
            color: #FFFFFF;
            background:
                linear-gradient(120deg, rgba(7, 17, 31, 0.96), rgba(18, 50, 94, 0.92) 58%, rgba(23, 105, 255, 0.76)),
                radial-gradient(circle at 82% 20%, rgba(6, 182, 212, 0.45), transparent 32%);
            box-shadow: 0 30px 80px rgba(7, 17, 31, 0.20);
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            overflow: hidden;
            position: relative;
        }

        .dashboard-hero::after {
            content: "";
            position: absolute;
            inset: 0;
            background-image:
                linear-gradient(rgba(255,255,255,0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.05) 1px, transparent 1px);
            background-size: 28px 28px;
            mask-image: linear-gradient(90deg, transparent, #000 40%, #000);
            pointer-events: none;
        }

        .hero-copy { position: relative; z-index: 1; }
        .hero-label { font-size: 12px; font-weight: 700; color: #7DD3FC; letter-spacing: 0.12em; margin-bottom: 10px; }
        .hero-title { font-size: 30px; line-height: 1.12; font-weight: 800; letter-spacing: 0; }
        .hero-sub { margin-top: 10px; color: rgba(226, 232, 240, 0.76); font-size: 13px; }
        .hero-meta {
            position: relative;
            z-index: 1;
            display: grid;
            grid-template-columns: repeat(3, minmax(82px, 1fr));
            gap: 10px;
            min-width: 330px;
        }
        .hero-pill {
            padding: 12px;
            border: 1px solid rgba(255, 255, 255, 0.14);
            background: rgba(255, 255, 255, 0.08);
            border-radius: 10px;
        }
        .hero-pill b { display: block; font-size: 18px; color: #FFFFFF; }
        .hero-pill span { display: block; margin-top: 3px; font-size: 11px; color: rgba(226, 232, 240, 0.68); }

        .section-title {
            margin: 20px 0 14px;
            font-size: 13px;
            letter-spacing: 0.04em;
            text-transform: uppercase;
        }

        .section-title::before {
            content: "";
            width: 8px;
            height: 18px;
            border-radius: 4px;
            background: linear-gradient(180deg, #1769FF, #06B6D4);
            box-shadow: 0 8px 18px rgba(23, 105, 255, 0.25);
        }

        .kpi-grid { gap: 18px; margin-bottom: 30px; }

        .kpi-card {
            min-height: 152px;
            border: 1px solid rgba(148, 163, 184, 0.22);
            background:
                linear-gradient(180deg, rgba(255, 255, 255, 0.96), rgba(249, 251, 255, 0.90));
            box-shadow: 0 18px 46px rgba(15, 23, 42, 0.07);
            overflow: hidden;
        }

        .kpi-card::before {
            content: "";
            position: absolute;
            inset: 0 0 auto 0;
            height: 3px;
            background: linear-gradient(90deg, #1769FF, #06B6D4);
        }

        .kpi-card.kpi-down::before { background: linear-gradient(90deg, #EF4444, #F59E0B); }
        .kpi-card.kpi-neu::before { background: linear-gradient(90deg, #64748B, #94A3B8); }

        .kpi-card:hover {
            box-shadow: 0 28px 72px rgba(15, 23, 42, 0.12);
            transform: translateY(-2px);
        }

        .kpi-name { font-size: 12px; letter-spacing: 0.01em; }
        .kpi-val { font-size: 31px; font-weight: 800; }
        .kpi-trend { border-radius: 999px; padding: 4px 8px; }

        .info-icon {
            background: rgba(23, 105, 255, 0.09);
            color: #1769FF;
        }

        .chart-grid { gap: 18px; }

        .chart-card {
            border: 1px solid rgba(148, 163, 184, 0.22);
            background:
                linear-gradient(180deg, rgba(255, 255, 255, 0.98), rgba(250, 252, 255, 0.92));
            box-shadow: 0 20px 54px rgba(15, 23, 42, 0.08);
            overflow: hidden;
        }

        .chart-card::before {
            content: "";
            position: absolute;
            top: 0;
            left: 24px;
            right: 24px;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(23, 105, 255, 0.42), transparent);
        }

        .chart-title { font-size: 16px; font-weight: 750; }
        .chart-desc { color: #6B778C; }

        @media (max-width: 1280px) {
            .kpi-grid { grid-template-columns: repeat(2, 1fr); }
            .col-8, .col-12, .col-16 { grid-column: span 24; }
            .hero-meta { min-width: 280px; }
        }

        function renderApplication() {
            const nt = document.getElementById('navMenu');
            const mc = document.getElementById('app-content');
            
            if (nt.children.length === 0) {
                businessData.forEach((t, i) => {
                    const btn = document.createElement('button');
                    btn.className = 'menu-item ' + (i === 0 ? 'active' : ''); 
                    btn.innerHTML = `
                        <div class="menu-icon">${EMOJI_ICONS[t.id] || '📊'}</div>
                        <div class="menu-text">
                            <div class="menu-title">${t.name}</div>
                            <div class="menu-sub">${t.sub}</div>
                        </div>
                    `;
                    btn.onclick = () => switchTab(t.id, btn); 
                    nt.appendChild(btn);
                });
            }

            mc.innerHTML = '';

            const getTrendClass = (trend) => trend.includes('+') ? 'up' : (trend.includes('-') ? 'down' : 'neu');
            const getDirectionText = (trendClass) => trendClass === 'up' ? '正向增长' : (trendClass === 'down' ? '需要关注' : '保持稳定');
            const getExecutiveSummary = (t, p0Kpis, otherKpis) => {
                const primary = p0Kpis[0] || t.kpis[0];
                const momentum = p0Kpis.find(k => getTrendClass(k.t) === 'up') || primary;
                const risk = t.kpis.find(k => getTrendClass(k.t) === 'down') || otherKpis[0] || primary;
                const support = p0Kpis[1] || otherKpis[0] || primary;
                return { primary, momentum, risk, support };
            };
            const renderSectionTitle = (name, meta) => `
                <div class="section-title">
                    <span class="section-name">${name}</span>
                    <span class="section-meta">${meta}</span>
                </div>`;
            const getChartInsight = (c, idx) => {
                const cues = [
                    '建议汇报时先看趋势斜率，再看结构变化，把异常点落到具体运营动作。',
                    '该图用于回答“增长来自哪里”，适合与核心指标联读，判断主贡献项是否健康。',
                    '该图用于识别资源投入优先级，重点关注高占比且波动明显的业务单元。',
                    '该图用于管理层复盘漏斗效率，优先定位流失最大的环节。'
                ];
                return cues[idx % cues.length];
            };

            businessData.forEach((t, i) => {
                const wr = document.createElement('div');
                wr.id = t.id; 
                wr.className = `dashboard-wrapper ${i === 0 ? 'active' : ''}`;
                const p0Kpis = t.kpis.filter(k => k.prio === 'P0');
                const otherKpis = t.kpis.filter(k => k.prio !== 'P0');
                const summary = getExecutiveSummary(t, p0Kpis, otherKpis);
                const momentumClass = getTrendClass(summary.momentum.t);
                const riskClass = getTrendClass(summary.risk.t);
                const supportClass = getTrendClass(summary.support.t);

                let h = '';
                h += `
                    <section class="dashboard-hero">
                        <div class="hero-copy">
                            <div class="hero-label">经营汇报 · ${t.name}</div>
                            <div class="hero-title">${t.title}</div>
                            <div class="hero-sub">本页聚焦管理层最关心的三件事：本周期结果、增长来源、需要介入的风险点。</div>
                        </div>
                        <div class="hero-meta">
                            <div class="hero-pill"><b>${summary.primary.v}</b><span>${summary.primary.n}</span></div>
                            <div class="hero-pill"><b>${summary.momentum.t}</b><span>${getDirectionText(momentumClass)}</span></div>
                            <div class="hero-pill"><b>${t.charts.length}</b><span>证据视图</span></div>
                        </div>
                    </section>
                    <section class="exec-summary">
                        <div class="exec-brief">
                            <div class="exec-kicker">关键结论</div>
                            <div class="exec-headline">${summary.primary.n} 当前为 ${summary.primary.v}，${summary.momentum.n} ${summary.momentum.t}。</div>
                            <div class="exec-copy">本页适合用于汇报开场：先明确本周期经营状态，再下钻到增长来源、效率变化与需要管理层拍板的风险项。</div>
                        </div>
                        <div class="exec-note ${momentumClass}">
                            <div class="exec-note-title">增长主引擎</div>
                            <div class="exec-note-value">${summary.momentum.v}</div>
                            <div class="exec-note-desc">${summary.momentum.n} ${summary.momentum.t}，建议作为本页正向结论的第一证据。</div>
                        </div>
                        <div class="exec-note ${riskClass}">
                            <div class="exec-note-title">管理层关注</div>
                            <div class="exec-note-value">${summary.risk.v}</div>
                            <div class="exec-note-desc">${summary.risk.n} ${summary.risk.t}，需结合渠道、转化或留存图进一步定位原因。</div>
                        </div>
                        <div class="exec-note ${supportClass}">
                            <div class="exec-note-title">支撑证据</div>
                            <div class="exec-note-value">${summary.support.v}</div>
                            <div class="exec-note-desc">${summary.support.n} 用于验证核心结论是否有稳定业务基础。</div>
                        </div>
                    </section>
                `;

                const renderCard = (k) => {
                    const c = getTrendClass(k.t);
                    return `
                        <div class="kpi-card kpi-${c}" data-priority="${k.prio}">
                            <div class="kpi-header">
                                <div class="kpi-name-box">
                                    <span class="kpi-name">${k.n}</span>
                                    <div class="info-wrapper">
                                        <div class="info-icon" data-title="${k.n}" data-desc="${k.d}"><span>?</span></div>
                                        <div class="tooltip-box"><b>${k.n}</b>${k.d}</div>
                                    </div>
                                </div>
                            </div>
                            <div class="kpi-main">
                                <div class="kpi-val">${k.v}</div>
                                <div class="kpi-trend ${c}">${k.t}</div>
                            </div>
                            <div class="sparkline-container">
                                <div class="kpi-sparkline" id="${k.id}"></div>
                            </div>
                        </div>`;
                };

                if (p0Kpis.length > 0) {
                    h += `${renderSectionTitle('核心战略指标', '优先汇报')}<div class="kpi-grid">`;
                    p0Kpis.forEach(k => h += renderCard(k));
                    h += `</div>`;
                }

                if (otherKpis.length > 0) {
                    h += `${renderSectionTitle('业务过程指标', '解释原因')}<div class="kpi-grid">`;
                    otherKpis.forEach(k => h += renderCard(k));
                    h += `</div>`;
                }

                h += `${renderSectionTitle('交叉分析矩阵', '支撑决策')}<div class="chart-grid">`;
                t.charts.forEach((c, ci) => {
                    c.cid = `${t.id}_c_${ci}`;
                    h += `<div class="chart-card ${c.cls}">
                            <div class="chart-header">
                                <div class="chart-title">${c.t}</div>
                                <div class="chart-desc">${c.d}</div>
                                <div class="chart-insight">${getChartInsight(c, ci)}</div>
                            </div>
                            <div class="chart-container" id="${c.cid}"></div>
                          </div>`;
                });
                h += `</div>`; 
                wr.innerHTML = h; 
                mc.appendChild(wr);
            });
        }

        /* SaaS 极简原生级平铺日期联动                                                */

        function switchGrain(grain, btn) { 
            window.currentGrain = grain;
            document.querySelectorAll('.segment-control button').forEach(b => b.classList.remove('active')); 
            btn.classList.add('active'); 
            renderDateInputs();
            window.dispatchEvent(new Event('resize'));
        }

        function renderDateInputs() {
            const filters = document.getElementById('quickFilters');
            const inputs = document.getElementById('dateInputContainer');
            if(!filters || !inputs) return;

            if (window.currentGrain === 'day') {
                filters.innerHTML = `
                    <button class="active" onclick="setDateRange('last7', this)">近 7 天</button>
                    <button onclick="setDateRange('last14', this)">近 14 天</button>
                    <button onclick="setDateRange('last30', this)">近 30 天</button>
                    <button onclick="setDateRange('thisMonth', this)">本月</button>
                `;
                inputs.innerHTML = `
                    <input type="date" id="vStart" value="2026-04-01" onchange="clearFastFilter()">
                    <span>-</span>
                    <input type="date" id="vEnd" value="2026-04-17" onchange="clearFastFilter()">
                `;
            } else if (window.currentGrain === 'week') {
                filters.innerHTML = `
                    <button class="active" onclick="setDateRange('thisWeek', this)">本周</button>
                    <button onclick="setDateRange('lastWeek', this)">上周</button>
                `;
                inputs.innerHTML = `
                    <input type="week" id="vStart" value="2026-W15" onchange="clearFastFilter()">
                    <span>-</span>
                    <input type="week" id="vEnd" value="2026-W16" onchange="clearFastFilter()">
                `;
            } else if (window.currentGrain === 'month') {
                filters.innerHTML = `
                    <button class="active" onclick="setDateRange('thisMonthM', this)">本月</button>
                    <button onclick="setDateRange('lastMonthM', this)">上月</button>
                `;
                inputs.innerHTML = `
                    <input type="month" id="vStart" value="2026-03" onchange="clearFastFilter()">
                    <span>-</span>
                    <input type="month" id="vEnd" value="2026-04" onchange="clearFastFilter()">
                `;
            }
        }

        function clearFastFilter() {
            document.querySelectorAll('.quick-filters button').forEach(btn => btn.classList.remove('active'));
        }

        function setDateRange(val, el) {
            clearFastFilter();
            if(el) el.classList.add('active');
            
            const end = new Date(), start = new Date();
            
            if (val === 'last7') { start.setDate(end.getDate() - 7); document.getElementById('vStart').value = start.toISOString().split('T')[0]; document.getElementById('vEnd').value = end.toISOString().split('T')[0]; }
            else if (val === 'last14') { start.setDate(end.getDate() - 14); document.getElementById('vStart').value = start.toISOString().split('T')[0]; document.getElementById('vEnd').value = end.toISOString().split('T')[0]; }
            else if (val === 'last30') { start.setDate(end.getDate() - 30); document.getElementById('vStart').value = start.toISOString().split('T')[0]; document.getElementById('vEnd').value = end.toISOString().split('T')[0]; }
            else if (val === 'thisMonth') { start.setDate(1); document.getElementById('vStart').value = start.toISOString().split('T')[0]; document.getElementById('vEnd').value = end.toISOString().split('T')[0]; }
            else if (val === 'thisWeek') { document.getElementById('vStart').value = "2026-W16"; document.getElementById('vEnd').value = "2026-W16"; }
            else if (val === 'lastWeek') { document.getElementById('vStart').value = "2026-W15"; document.getElementById('vEnd').value = "2026-W15"; }
            else if (val === 'thisMonthM') { document.getElementById('vStart').value = "2026-04"; document.getElementById('vEnd').value = "2026-04"; }
            else if (val === 'lastMonthM') { document.getElementById('vStart').value = "2026-03"; document.getElementById('vEnd').value = "2026-03"; }
        }

        function exportData() {
            const activeTabId = document.querySelector('.dashboard-wrapper.active').id;
            const tabData = businessData.find(t => t.id === activeTabId);
            if (!tabData) return;

            let csvContent = '\uFEFF'; 
            csvContent += `【系统导出】${tabData.title}\n\n--- 核心字典明细 ---\n指标名称,绝对数值,环比趋势,业务定义\n`;
            tabData.kpis.forEach(k => {
                let n = k.n.replace(/<[^>]+>/g, '').replace(/"/g, '""');
                let v = k.v.replace(/<[^>]+>/g, '').replace(/"/g, '""');
                let t = k.t.replace(/<[^>]+>/g, '').replace(/"/g, '""');
                let d = k.d.replace(/<[^>]+>/g, '').replace(/"/g, '""');
                csvContent += `"${n}","${v}","${t}","${d}"\n`;
            });
            const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement("a"); link.href = URL.createObjectURL(blob);
            link.download = `NN大盘数据_${tabData.name}_${new Date().toISOString().split('T')[0]}.csv`;
            document.body.appendChild(link); link.click(); document.body.removeChild(link);
        }

        function switchTab(id, btn) {
            document.querySelectorAll('.dashboard-wrapper').forEach(el => {
                el.classList.remove('active');
            });
            document.querySelectorAll('.menu-item').forEach(el => el.classList.remove('active'));
            
            const activeWrapper = document.getElementById(id);
            activeWrapper.classList.add('active');
            btn.classList.add('active');
            
            const tabData = businessData.find(t => t.id === id);
            if(tabData) document.getElementById('headerTitle').innerHTML = `${tabData.title}`;

            setTimeout(() => { 
                if (window.MyChartInstances && window.MyChartInstances.length > 0) {
                    window.MyChartInstances.forEach(item => { if (item.tabId === id) item.chart.resize(); }); 
                }
            }, 50);
            
            document.querySelector('.content-scroll').scrollTo(0, 0);
        }

        function bindGlobalTooltips() {
            let tip = document.getElementById('biGlobalTooltip');
            if (!tip) {
                tip = document.createElement('div');
                tip.id = 'biGlobalTooltip';
                tip.className = 'bi-global-tooltip';
                document.body.appendChild(tip);
            }

            const moveTip = (event) => {
                const gap = 14;
                const rect = tip.getBoundingClientRect();
                let left = event.clientX + gap;
                let top = event.clientY + gap;

                if (left + rect.width > window.innerWidth - 12) left = event.clientX - rect.width - gap;
                if (top + rect.height > window.innerHeight - 12) top = event.clientY - rect.height - gap;

                tip.style.left = `${Math.max(12, left)}px`;
                tip.style.top = `${Math.max(12, top)}px`;
            };

            document.querySelectorAll('.info-icon').forEach(icon => {
                icon.addEventListener('mouseenter', event => {
                    tip.innerHTML = `<b>${icon.dataset.title || ''}</b>${icon.dataset.desc || ''}`;
                    tip.style.display = 'block';
                    moveTip(event);
                });
                icon.addEventListener('mousemove', moveTip);
                icon.addEventListener('mouseleave', () => {
                    tip.style.display = 'none';
                });
            });
        }

        /* -------------------------------------------------------------------------- */
        /* ECharts 渲染引擎：商业高级配色 (Slate / Blue / Emerald / Indigo)           */
        /* -------------------------------------------------------------------------- */
        function initAllECharts() {
            const commonOpt = {
                color: ['#07121F', '#1356D0', '#00A7C8', '#0E9F6E', '#D79000', '#7C3AED'],
                tooltip: { appendToBody: true, trigger: 'axis', backgroundColor: 'rgba(7,18,31,0.96)', borderColor: 'rgba(255,255,255,0.14)', borderWidth: 1, padding: [12, 14], textStyle: { color: '#F8FAFC', fontSize: 13, fontWeight: 500 }, extraCssText: 'border-radius: 12px; box-shadow: 0 28px 90px rgba(7, 18, 31, 0.26); backdrop-filter: blur(16px); z-index: 999999;' },
                legend: { type: 'scroll', bottom: 0, icon: 'circle', itemGap: 24, textStyle: { color: '#65738A', fontWeight: 600 } },
                grid: { top: '12%', left: '0%', right: '2%', bottom: '15%', containLabel: true }
            };
            const axX = { type: 'category', axisLine: { lineStyle: { color: 'rgba(101,115,138,0.22)' } }, axisLabel: { color: '#65738A', fontWeight: 600 } };
            const axY = { type: 'value', splitLine: { show: true, lineStyle: { color: 'rgba(101,115,138,0.16)', type: 'dashed' } }, axisLabel: { color: '#65738A', fontWeight: 600 } };

            businessData.forEach(tab => {
                tab.kpis.forEach(kpi => {
                    const sparkDom = document.getElementById(kpi.id);
                    if(sparkDom && kpi.td) {
                        const sparkChart = echarts.init(sparkDom);
                        const themeColor = kpi.s === 'up' ? '#1356D0' : (kpi.s === 'down' ? '#D79000' : '#65738A');
                        
                        sparkChart.setOption({
                            grid: {top: 2, bottom: 0, left: 0, right: 0},
                            xAxis: {type: 'category', show: false, data: [1, 2, 3, 4, 5, 6, 7]},
                            yAxis: {type: 'value', show: false, min: 'dataMin'},
                            tooltip: { 
                                appendToBody: true, 
                                trigger: 'axis', 
                                padding: [8, 12], 
                                backgroundColor: 'rgba(7,18,31,0.96)', 
                                borderColor:'rgba(255,255,255,0.14)',
                                borderWidth: 1,
                                textStyle: { color: '#F8FAFC' },
                                extraCssText: 'border-radius: 12px; box-shadow: 0 28px 90px rgba(7,18,31,0.26);',
                                axisPointer: { type: 'line', lineStyle: { color: 'rgba(19,86,208,0.24)' } },
                                formatter: function(p) {
                                    let label = '';
                                    let idx = p[0].dataIndex;
                                    if(window.currentGrain === 'day') {
                                        let mapDay = ['04-11', '04-12', '04-13', '04-14', '04-15', '04-16', '04-17'];
                                        label = mapDay[idx] + ' (日)';
                                    } else if(window.currentGrain === 'week') {
                                        let mapWeek = ['2026-W10', '2026-W11', '2026-W12', '2026-W13', '2026-W14', '2026-W15', '2026-W16'];
                                        label = mapWeek[idx] + ' (周)';
                                    } else {
                                        let mapMonth = ['2025-10', '2025-11', '2025-12', '2026-01', '2026-02', '2026-03', '2026-04'];
                                        label = mapMonth[idx] + ' (月)';
                                    }
                                    return `<div style="font-size:12px;color:#7DD3FC;margin-bottom:4px;font-weight:600;">${label}</div>
                                            <div style="font-size:15px;font-weight:700;color:#FFFFFF;font-family:Inter, sans-serif;">${p[0].value}</div>`;
                                }
                            },
                            series: [{ type: 'line', data: kpi.td.map(v => parseFloat(v).toFixed(1)), smooth: true, symbol: 'none', lineStyle: {width: 2, color: themeColor}, areaStyle: { color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [{offset: 0, color: themeColor + '15'}, {offset: 1, color: 'rgba(255,255,255,0)'}]) } }]
                        });
                        window.MyChartInstances.push({ tabId: tab.id, chart: sparkChart });
                    }
                });

                tab.charts.forEach(cfg => {
                    const dom = document.getElementById(cfg.cid);
                    if (!dom) return;
                    const chart = echarts.init(dom);
                    let opt = {}; const xd = cfg.x || []; const sd = cfg.sd || [];

                    switch(cfg.ty) {
                        case 'dualAxis':
                        case 'lineArea': 
                            opt = { xAxis: { ...axX, data: xd, boundaryGap: false }, yAxis: cfg.ty === 'dualAxis' ? [axY, { ...axY, splitLine: {show:false} }] : axY, series: sd.map((s, i) => ({ name: s.name, type: 'line', smooth: true, symbolSize: 6, data: s.data, yAxisIndex: cfg.ty === 'dualAxis' ? i : 0, lineStyle: { width: 3, color: i === 0 ? '#07121F' : '#1356D0' }, itemStyle: { color: i === 0 ? '#07121F' : '#1356D0' }, areaStyle: i === 0 ? { color: new echarts.graphic.LinearGradient(0,0,0,1, [{offset:0,color:'rgba(19,86,208,0.14)'},{offset:1,color:'rgba(19,86,208,0)'}]) } : null })) }; break;
                        case 'area':
                            opt = { xAxis: { ...axX, boundaryGap: false, data: xd }, yAxis: axY, series: [{ name: sd[0]?sd[0].name:'', type: 'line', smooth: true, symbol: 'none', data: sd[0]?sd[0].data:[], lineStyle: { width: 3, color: '#1356D0' }, areaStyle: { color: new echarts.graphic.LinearGradient(0,0,0,1, [{offset:0,color:'rgba(19,86,208,0.16)'},{offset:1,color:'rgba(19,86,208,0)'}]) } }] }; break;
                        case 'multiLine':
                        case 'line':
                            opt = { xAxis: { ...axX, data: xd }, yAxis: axY, series: sd.map((s, i) => ({ name: s.name, type: 'line', smooth: true, symbolSize: 6, data: s.data, lineStyle: {width: 3, type: i===0?'solid':'dashed'} })) }; break;
                        case 'bar':
                            opt = { xAxis: { ...axX, data: xd }, yAxis: axY, series: [{ name: sd[0]?sd[0].name:'', type: 'bar', data: sd[0]?sd[0].data:[], barWidth: '30%', itemStyle: { borderRadius: [6,6,0,0], color: '#1356D0' } }] }; break;
                        case 'bar_pct': 
                            let sb = sd[0]?sd[0].data.reduce((a,b)=>a+b, 0):1;
                            opt = { xAxis: { ...axX, data: xd }, yAxis: axY, tooltip: { appendToBody: true, trigger: 'axis', formatter: p => `${p[0].name}<br/>${p[0].marker} ${p[0].seriesName}: <b>${p[0].value.toLocaleString()}</b> (${((p[0].value/sb)*100).toFixed(1)}%)` }, series: [{ name: sd[0]?sd[0].name:'', type: 'bar', data: sd[0]?sd[0].data:[], barWidth: '35%', label: {show:true, position:'top', color:'#07121F', fontWeight:600, formatter: p=>`${((p.value/sb)*100).toFixed(1)}%`}, itemStyle: { borderRadius: [6,6,0,0], color: '#1356D0' } }] }; break;
                        case 'barH':
                        case 'barH_pct': 
                            let sh = sd[0]?sd[0].data.reduce((a,b)=>a+b, 0):1; let isP = cfg.ty === 'barH_pct';
                            opt = { xAxis: { ...axY, splitLine: {show:false} }, yAxis: { ...axX, data: xd }, tooltip: isP ? { appendToBody: true, trigger: 'axis', formatter: p => `${p[0].name}<br/>${p[0].marker} ${p[0].seriesName}: <b>${p[0].value.toLocaleString()}</b> (${((p[0].value/sh)*100).toFixed(1)}%)` } : {appendToBody: true, trigger: 'axis'}, series: [{ name: sd[0]?sd[0].name:'', type: 'bar', data: sd[0]?sd[0].data:[], barWidth: '40%', label: {show:true, position:'right', color:'#07121F', fontWeight: 600, formatter: p => isP ? `${((p.value/sh)*100).toFixed(1)}%` : `${p.value.toLocaleString()}`}, itemStyle: { borderRadius: [0,6,6,0], color: '#1356D0' } }] }; break;
                        case 'barGroup':
                            opt = { xAxis: { ...axX, data: xd }, yAxis: axY, series: [{ name: sd[0]?sd[0].name:'', type: 'bar', data: sd[0]?sd[0].data:[], barWidth: '25%', itemStyle: { borderRadius: [6,6,0,0], color: '#07121F' } }, { name: sd[1]?sd[1].name:'', type: 'bar', data: sd[1]?sd[1].data:[], barWidth: '25%', itemStyle: { borderRadius: [6,6,0,0], color: '#1356D0' } }] }; break;
                        case 'stackedArea':
                            opt = { xAxis: { ...axX, boundaryGap: false, data: xd }, yAxis: axY, series: sd.map((s,i) => ({ name: s.name, type: 'line', stack: 'Total', smooth: true, areaStyle: {opacity:0.1}, showSymbol: false, data: s.data })) }; break;
                        case 'funnel':
                            opt = { series: [{ name: '绝对漏斗损耗', type: 'funnel', left: '15%', right: '15%', top: '5%', bottom: '10%', gap: 2, label: { position: 'inside', color: '#fff', fontWeight: 500, formatter: '{b}\n{c}%' }, itemStyle: { borderWidth: 0, borderRadius: 4 }, data: sd }] }; break;
                        case 'pie':
                        case 'pie_pct':
                        case 'pieRose':
                            opt = { tooltip: { appendToBody: true, trigger: 'item', formatter: '{a} <br/>{b}: <b>{c}</b> ({d}%)' }, legend: { type: 'scroll', bottom: 0, textStyle: {color: '#65738A'} }, series: [{ name: '绝对占比', type: 'pie', radius: cfg.ty==='pieRose' ? ['20%','70%'] : ['45%','70%'], roseType: cfg.ty==='pieRose' ? 'area' : false, label: {show:true, formatter:'{b}\n{d}%', lineHeight:14, color:'#26364D', fontWeight:600}, itemStyle: { borderWidth: 2, borderColor: '#FFFFFF', borderRadius: 6 }, data: sd }] }; break;
                    }
                    chart.setOption(Object.assign({}, commonOpt, opt)); window.MyChartInstances.push({ tabId: tab.id, chart: chart });
                });
            });
        }

        window.onload = () => {
            try {
                renderApplication();
                bindGlobalTooltips();
                initAllECharts();
                switchTab(businessData[0].id, document.querySelector('.menu-item')); 
            } catch (e) { 
                document.body.innerHTML = `<div style="color:red; font-size:24px; padding: 50px;">系统初始化渲染异常，请检查：${e.message}</div>`; 
            } 
        };
        
        window.addEventListener('resize', () => { const act = document.querySelector('.dashboard-wrapper.active'); if (act && window.MyChartInstances) { window.MyChartInstances.forEach(item => { if (item.tabId === act.id) item.chart.resize(); }); } });
    </script>
</body>
</html>
